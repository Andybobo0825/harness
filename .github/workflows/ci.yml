name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: python -m unittest discover -s tests -p 'test_*.py' -v
      - run: python -m compileall -q personal_harness tests scripts
      - run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Build immutable release candidate
        run: |
          VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          python scripts/build-harness-release --wheel "dist/personal_harness-$VERSION-py3-none-any.whl" --output dist/release --tag "v$VERSION"
      - run: python -m venv /tmp/harness-wheel-smoke
      - run: /tmp/harness-wheel-smoke/bin/python -m pip install dist/personal_harness-*-py3-none-any.whl
      - run: /tmp/harness-wheel-smoke/bin/harness --help
      - run: /tmp/harness-wheel-smoke/bin/harness-codex --help
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: harness-release-candidate
          path: dist/release/
