name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release-smoke:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: python -m unittest discover -s tests -p 'test_*.py' -v
      - run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Build and smoke release candidate
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python scripts/build-harness-release --wheel "dist/personal_harness-$VERSION-py3-none-any.whl" --output dist/release --tag "$GITHUB_REF_NAME"
          scripts/smoke-harness-release dist/release "$RUNNER_TEMP/harness-release-e2e"

  release:
    needs: macos-release-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Verify tag matches package version
        run: |
          VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - run: python -m unittest discover -s tests -p 'test_*.py' -v
      - run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Build immutable release assets
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python scripts/build-harness-release --wheel "dist/personal_harness-$VERSION-py3-none-any.whl" --output dist/release --tag "$GITHUB_REF_NAME"
      - name: Verify wheel install
        run: |
          python -m venv /tmp/harness-release-smoke
          /tmp/harness-release-smoke/bin/python -m pip install dist/release/personal_harness-*-py3-none-any.whl
          /tmp/harness-release-smoke/bin/harness --help
      - name: Run staged installer E2E in isolated homes
        run: scripts/smoke-harness-release dist/release "$RUNNER_TEMP/harness-release-e2e"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/release/* --verify-tag --generate-notes
